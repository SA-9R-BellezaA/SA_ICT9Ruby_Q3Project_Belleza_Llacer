<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration | Dubai Metro Guide</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= BODY ================= */

body {
    background: linear-gradient(rgba(20,15,5,0.85), rgba(20,15,5,0.9)),
                url("dubai.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #f5e6c8;
    font-family: Georgia, serif;
    margin: 0;
}

/* ================= NAVBAR ================= */

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 60px;
    background: rgba(30,20,5,0.95);
    border-bottom: 1px solid #d4af37;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #d4af37;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
}

.nav-links a {
    color: #f5e6c8;
    text-decoration: none;
    transition: 0.3s ease;
}

.nav-links a:hover,
.nav-links a.active {
    color: #d4af37;
    border-bottom: 2px solid #d4af37;
    padding-bottom: 3px;
}

.nav-buttons {
    display: flex;
    gap: 15px;
}

.book {
    color: #d4af37;
    text-decoration: none;
    font-weight: bold;
}

.create-btn {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    color: #1a1204;
    font-weight: bold;
    transition: 0.3s ease;
}

.create-btn:hover {
    box-shadow: 0 0 10px #d4af37;
    transform: scale(1.05);
}

/* ================= REGISTRATION SECTION ================= */

.hero {
    padding: 80px 60px;
    min-height: 100vh;
    display: flex;
    justify-content: center;
}

.registration-card {
    background: rgba(40, 25, 10, 0.95);
    border-radius: 18px;
    padding: 40px;
    border: 1px solid #c6a75e;
    box-shadow: 0 0 30px rgba(212,175,55,0.35);
    display: flex;
    gap: 40px;
    max-width: 1100px;
    width: 100%;
}

/* LEFT PANEL */

.left-panel {
    width: 30%;
    text-align: center;
}

.profile-placeholder {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid #d4af37;
    margin: 0 auto 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d4af37;
    overflow: hidden;
}

.upload-btn {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    border: none;
    padding: 8px 14px;
    color: #1a1204;
    font-weight: bold;
    border-radius: 6px;
    margin-top: 10px;
}

/* RIGHT PANEL */

.right-panel {
    width: 70%;
}

.right-panel h1 {
    color: #d4af37;
    letter-spacing: 2px;
}

.instructions {
    color: #e6d3a3;
    margin-bottom: 20px;
}

label {
    margin-top: 10px;
    color: #d4af37;
}

input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #c6a75e;
    background: rgba(60,40,15,0.8);
    color: #fff;
}

.row {
    display: flex;
    gap: 15px;
}

.row div {
    width: 50%;
}

.terms {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.submit-btn {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    border: none;
    padding: 10px;
    width: 100%;
    color: #1a1204;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 15px;
    transition: 0.3s ease;
}

.submit-btn:hover {
    box-shadow: 0 0 15px #d4af37;
    transform: scale(1.02);
}

/* ================= FOOTER ================= */

footer {
    background: rgba(30,20,5,0.95);
    text-align: center;
    padding: 15px;
    border-top: 1px solid #d4af37;
    color: #d4af37;
}

</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">حبيبتي</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="page4.html">Fare Matrix</a></li>
        <li><a href="page3.html">Help</a></li>
    </ul>
    <div class="nav-buttons">
        <a href="page2.html" class="create-btn active">Create Account</a>
    </div>
</nav>

<section class="hero">

<div class="registration-card">

<div class="left-panel">
    <div class="profile-placeholder">
        <img id="profilePreview" style="width:100%; height:100%; object-fit:cover; display:none;">
        <span id="placeholderText">Profile Image</span>
    </div>
    <input type="file" id="profileInput" accept="image/*">
    <button type="button" class="upload-btn" id="uploadBtn">Upload Photo</button>
</div>

<div class="right-panel">
    <h1>REGISTRATION</h1>
    <p class="instructions">
        Please fill out all required fields accurately.
    </p>

<form id="registrationForm">

<label>First Name</label>
<input type="text" id="firstName">

<label>Last Name</label>
<input type="text" id="lastName">

<div class="row">
<div>
<label>Age</label>
<input type="number" id="age">
</div>
<div>
<label>Contact Number</label>
<input type="text" id="contact">
</div>
</div>

<label>Email</label>
<input type="email" id="email">

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<div class="terms">
<input type="checkbox" id="terms">
<span>I accept the Terms and Privacy Policy</span>
</div>

<button type="submit" class="submit-btn">Create my account</button>

</form>
</div>
</div>
</section>

<footer>
Belleza & Llacer | 9-Ruby ©2026
</footer>

<script>
// IMAGE PREVIEW
document.getElementById("uploadBtn").addEventListener("click", function() {
    const file = document.getElementById("profileInput").files[0];
    if (!file) return alert("Please select an image first!");

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = document.getElementById("profilePreview");
        img.src = e.target.result;
        img.style.display = "block";
        document.getElementById("placeholderText").style.display = "none";
    };
    reader.readAsDataURL(file);
});

// FORM VALIDATION
document.getElementById("registrationForm").addEventListener("submit", function(e){
    e.preventDefault();

    const age = parseInt(document.getElementById("age").value);
    const terms = document.getElementById("terms").checked;

    if (age < 18) return alert("You must be at least 18 years old.");
    if (!terms) return alert("Please accept the Terms and Privacy Policy.");

    alert("Your profile has been uploaded successfully!");
    this.reset();
});
</script>

</body>
</html>
