<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Georgia', serif; 
}

body {
    background: linear-gradient(rgba(20,15,5,0.85), rgba(20,15,5,0.9)),
                url("dubai.jpg") no-repeat center center/cover;
    background-size: cover;
    background-position: center;
    color: #f5e6c8; /* soft gold cream */
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(30,20,5,0.9);
    border-bottom: 1px solid #c6a75e;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    color: #f5e6c8;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #d4af37;
}

.nav-buttons .book {
    margin-right: 15px;
    color: #d4af37;
    text-decoration: none;
    font-weight: bold;
}

.create-btn {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    padding: 8px 15px;
    border-radius: 5px;
    text-decoration: none;
    color: #1a1204;
    font-weight: bold;
    transition: 0.3s;
}

.create-btn:hover {
    box-shadow: 0 0 10px #d4af37;
}

.hero {
    height: 90vh;
    background: linear-gradient(rgba(20,15,5,0.6), rgba(20,15,5,0.7)),
                url("dubai.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}
/* Registration Card */
.registration-card {
    display: flex;
    width: 800px;
    background: rgba(40, 25, 10, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 30px;
    border: 1px solid #c6a75e;
    box-shadow: 0 0 25px rgba(212,175,55,0.4);
}

/* Left Panel */
.left-panel {
    width: 40%;
    text-align: center;
}

.profile-placeholder {
    width: 150px;
    height: 150px;
    background: #2b1a05;
    color: #d4af37;
    border: 2px solid #d4af37;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 20px;
    font-size: 14px;
}

.upload-btn {
    margin-top: 10px;
    background: linear-gradient(45deg, #d4af37, #b8860b);
    border: none;
    padding: 8px 12px;
    color: #1a1204;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.upload-btn:hover {
    box-shadow: 0 0 10px #d4af37;
}

/* Right Panel */
.right-panel {
    width: 60%;
    padding-left: 20px;
}

.right-panel h1 {
    margin-bottom: 10px;
    color: #d4af37;
    letter-spacing: 2px;
}

.instructions {
    font-size: 14px;
    margin-bottom: 15px;
    color: #e6d3a3;
}

form label {
    display: block;
    margin-top: 10px;
    font-size: 14px;
}

form input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #c6a75e;
    background: #2b1a05;
    color: #f5e6c8;
}

form input:focus {
    outline: none;
    border: 1px solid #d4af37;
    box-shadow: 0 0 8px #d4af37;
}

.row {
    display: flex;
    gap: 10px;
}

.row div {
    flex: 1;
}

.terms {
    margin-top: 15px;
    font-size: 13px;
}

.submit-btn {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background: linear-gradient(45deg, #d4af37, #b8860b);
    border: none;
    color: #1a1204;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.submit-btn:hover {
    box-shadow: 0 0 15px #d4af37;
}

.cancel-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background-color: #5a4a2a;
    border: 1px solid #c6a75e;
    color: #f5e6c8;
    border-radius: 5px;
    cursor: pointer;
}

/* Footer */
footer {
    text-align: center;
    padding: 10px;
    background: rgba(30,20,5,0.9);
    font-size: 14px;
    color: #d4af37;
    border-top: 1px solid #c6a75e;
}

  </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">حبيبتي</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Fare Matrix</a></li>
            <li><a href="#">Confirmation</a></li>
        </ul>
        <div class="nav-buttons">
            <a href="#" class="book">Book Now</a>
            <a href="#" class="create-btn">Create Account</a>
        </div>
    </nav>

    <section class="hero">

        <div class="registration-card">

<div class="left-panel">
    <div class="profile-placeholder">
        <img id="profilePreview" src="" alt="Profile Image" 
             style="width:100%; height:100%; border-radius:50%; object-fit:cover; display:none;">
        <span id="placeholderText">Profile Image</span>
    </div>

    <input type="file" id="profileInput" accept="image/*">
    <button type="button" class="upload-btn" id="uploadBtn">Upload Photo</button>
</div>

            <div class="right-panel">
                <h1>REGISTRATION</h1>

                <p class="instructions">
                    Please fill out all required fields in the registration form with accurate information.
                </p>

                <!-- ✅ ADDED ID -->
                <form id="registrationForm">

                    <label>First Name</label>
                    <input type="text" id="firstName">

                    <label>Last Name</label>
                    <input type="text" id="lastName">

                    <div class="row">
                        <div>
                            <label>Age</label>
                            <input type="number" id="age">
                        </div>
                        <div>
                            <label>Contact Number</label>
                            <input type="text" id="contact">
                        </div>
                    </div>

                    <label>Email</label>
                    <input type="email" id="email">

                    <label>Enter your username</label>
                    <input type="text" id="username">

                    <label>Enter your password</label>
                    <input type="password" id="password">

                    <div class="terms">
                        <input type="checkbox" id="terms">
                        <span>I accept the Terms of Use and Privacy Policy</span>
                    </div>

                    <!-- ✅ MADE IT A SUBMIT BUTTON -->
                    <button type="submit" class="submit-btn">Create my account</button>

                    <script>
    // PROFILE IMAGE PREVIEW

    const profileInput = document.getElementById("profileInput");
    const profilePreview = document.getElementById("profilePreview");
    const placeholderText = document.getElementById("placeholderText");
    const uploadBtn = document.getElementById("uploadBtn");

    uploadBtn.addEventListener("click", function() {

        const file = profileInput.files[0];

        if (!file) {
            alert("Please select an image first!");
            return;
        }

        const reader = new FileReader();

        reader.onload = function(e) {
            profilePreview.src = e.target.result;
            profilePreview.style.display = "block";
            placeholderText.style.display = "none";
        };

        reader.readAsDataURL(file);
    });
</script>
                </form>
            </div>

        </div>
    </section>

    <footer>
        Belleza & Llacer | 9-Ruby ©2026
    </footer>

<script>
    const form = document.getElementById("registrationForm");

    form.addEventListener("submit", function(event) {

        event.preventDefault();

        // ✅ Get values using IDs (cleaner and safer)
        const firstName = document.getElementById("firstName").value;
        const lastName = document.getElementById("lastName").value;
        const age = parseInt(document.getElementById("age").value);
        const contact = document.getElementById("contact").value;
        const email = document.getElementById("email").value;
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const terms = document.getElementById("terms").checked;

        if (!firstName || !lastName || !age || !contact || !email || !username || !password) {
            alert("Please fill out all fields!");
            return;
        }

        if (!terms) {
            alert("You must accept the Terms and Privacy Policy!");
            return;
        }

        if (age < 18) {
            alert("You must be at least 18 years old to register.");
            return;
        }

        alert("Your profile has been uploaded successfully!");

        form.reset();
    });
</script>

</body>
</html>
