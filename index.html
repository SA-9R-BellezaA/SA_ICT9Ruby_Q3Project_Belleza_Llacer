<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home | Dubai Metro Guide</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

<style>
/* ================= BODY ================= */

body {
    background: linear-gradient(rgba(20,15,5,0.85), rgba(20,15,5,0.9)),
                url("dubai.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #f5e6c8;
    font-family: Georgia, serif;
    margin: 0;
}

/* ================= NAVBAR ================= */

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 60px;
    background: rgba(30,20,5,0.95);
    border-bottom: 1px solid #d4af37;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #d4af37;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
}

.nav-links li {
    display: inline;
}

.nav-links a {
    color: #f5e6c8;
    text-decoration: none;
    transition: 0.3s ease;
}

.nav-links a:hover {
    color: #d4af37;
}

.nav-links a.active {
    color: #d4af37;
    border-bottom: 2px solid #d4af37;
    padding-bottom: 3px;
}

.nav-buttons {
    display: flex;
    gap: 15px;
}

.book {
    color: #d4af37;
    text-decoration: none;
    font-weight: bold;
}

.create-btn {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    color: #1a1204;
    font-weight: bold;
    transition: 0.3s ease;
}

.create-btn:hover {
    box-shadow: 0 0 10px #d4af37;
    transform: scale(1.05);
}

/* ================= HERO SECTION ================= */

.hero-section {
    padding: 80px 60px;
    min-height: 90vh;
    display: flex;
    align-items: center;
}

.hero-box {
    background: rgba(40, 25, 10, 0.9);
    border-radius: 18px;
    padding: 50px;
    border: 1px solid #c6a75e;
    box-shadow: 0 0 30px rgba(212,175,55,0.35);
    max-width: 900px;
}

.hero-box h1 {
    color: #d4af37;
    letter-spacing: 2px;
}

.hero-box p {
    color: #e6d3a3;
    margin-top: 20px;
}

/* Buttons */

.btn-gold {
    background: linear-gradient(45deg, #d4af37, #b8860b);
    border: none;
    color: #1a1204;
    font-weight: bold;
}

.btn-gold:hover {
    box-shadow: 0 0 15px #d4af37;
    transform: scale(1.05);
}

.btn-outline-gold {
    border: 1px solid #d4af37;
    color: #d4af37;
}

.btn-outline-gold:hover {
    background: #d4af37;
    color: #1a1204;
}

/* ================= FOOTER ================= */

footer {
    background: rgba(30,20,5,0.95);
    text-align: center;
    padding: 15px;
    border-top: 1px solid #d4af37;
    color: #d4af37;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">حبيبتي</div>

    <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="page4.html">Fare Matrix</a></li>
        <li><a href="page3.html">Help</a></li>
    </ul>

    <div class="nav-buttons">
        <a href="page2.html" class="create-btn">Create Account</a>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="hero-section">

    <div class="hero-box">
        <h1>حبيبتي Your Smart Fare Guide</h1>

        <p>
            Plan your Dubai Metro journey with ease.  
            View station routes, explore the metro map, and preview estimated fares 
            before booking your ride.
        </p>

        <div class="mt-4">
            <a href="page4.html" class="btn btn-gold me-3">View Fare Matrix</a>
            <a href="page2.html" class="btn btn-outline-gold">Register Now</a>
        </div>
    </div>

</section>

<footer>
    Belleza & Llacer | 9-Ruby ©2026
</footer>

</body>

</html>
